<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chistecitos - Reíte sin parar</title>
    <meta name="description" content="Chistecitos: app de chistes clásicos para Android. Funciona sin internet.">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #3D1F66;
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;

        .container {

            margin-bottom: 20px;
            color: #FFC93C;

        }
        .slogan {
            font-size: 1.2rem;
            opacity: 0.85;
            margin-bottom: 40px;
        }
        .description {

            line-height: 1.6;
            margin-bottom: 30px;
            opacity: 0.9;
        }
        .links {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 30px;
        }
        .links a {

            padding: 12px 24px;
            border: 2px solid #FFC93C;

        .links a:hover {

            color: #3D1F66;

        </p>
